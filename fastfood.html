<!DOCTYPE html>
<html>
<head>
    <title>Fast Food Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="index.html" class="back-btn">⬅ Back to Home</a>

    <h1 class="h-primary center">Fast Food Menu</h1>

    <div class="menu-grid">

        <div class="menu-card">
            <img src="Hambúrguer De Queijo Delicioso E Irritadiço PNG , Hambúrguer, Comida, Comida Rápida PNG Imagem para download gratuito.jpg">
            <h3>Veg Burger</h3>
            <p>₹90</p>
            <button onclick="addToCart('Veg Burger',90)">Add</button>
        </div>

        <div class="menu-card">
            <img src="A Buffalo Pizza on wooden plate isolated on a transparent background.jpg">
            <h3>Cheese Pizza</h3>
            <p>₹160</p>
            <button onclick="addToCart('Cheese Pizza',450)">Add</button>
        </div>

        <div class="menu-card">
            <img src="Crispy french fries on a plate isolated in a white background _ Premium AI-generated image.jpg">
            <h3>French Fries</h3>
            <p>₹80</p>
            <button onclick="addToCart('French Fries',80)">Add</button>
        </div>

        <div class="menu-card">
            <img src="Easy Chicken Momo Dumplings (Sajilo Kukhura ko Momo) सजिलो कुखुराको म_म_.jpg">
            <h3>Veg Momos</h3>
            <p>₹120</p>
            <button onclick="addToCart('Veg Momos',120)">Add</button>
        </div>

        <div class="menu-card">
            <img src="White Sauce Pasta (Bechamel Sauce Pasta).jpg">
            <h3>White Sauce Pasta</h3>
            <p>₹150</p>
            <button onclick="addToCart('White Sauce Pasta',150)">Add</button>
        </div>

        <div class="menu-card">
            <img src="Chinese Potato Fry.jpg">
            <h3>Chilli Potato</h3>
            <p>₹110</p>
            <button onclick="addToCart('Chilli Potato',110)">Add</button>
        </div>

        <div class="menu-card">
            <img src="The sandwich is layered with toasted sourdough bread, crispy lettuce.jpg">
            <h3>Veg Sandwich</h3>
            <p>₹70</p>
            <button onclick="addToCart('Veg Sandwich',70)">Add</button>
        </div>

        <div class="menu-card">
            <img src="Easy Vegetable Spring Rolls.jpg">
            <h3>Spring Rolls</h3>
            <p>₹130</p>
            <button onclick="addToCart('Spring Rolls',130)">Add</button>
        </div>

        <div class="menu-card">
            <img src="Cheesy Garlic Bread Toast.jpg">
            <h3>Garlic Bread</h3>
            <p>₹100</p>
            <button onclick="addToCart('Garlic Bread',100)">Add</button>
        </div>

        <div class="menu-card">
            <img src="I'M Obsessed With These Golden Caramelized Onions!.jpg">
            <h3>Veg Hot Dog</h3>
            <p>₹95</p>
            <button onclick="addToCart('Veg Hot Dog',95)">Add</button>
        </div>

    </div>

    <script src="cart.js"></script>
    <script>
        updateCartCount();
    </script>

</body>
</html>
