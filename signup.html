<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup — Spicy Plate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* ===== SIGNUP PAGE EXTRA STYLE ===== */

.signup-section{
min-height:80vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to right,#8b0000,#2b0000);
}

.signup-box{
background:white;
padding:40px;
width:380px;
border-radius:18px;
box-shadow:0 12px 35px rgba(0,0,0,.35);
text-align:center;
}

.signup-title{
font-family:Pacifico;
font-size:34px;
color:#b30000;
margin-bottom:8px;
}

.signup-sub{
font-size:14px;
color:#666;
margin-bottom:22px;
}

.signup-box input{
width:100%;
padding:12px;
margin:9px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

.signup-box input:focus{
outline:none;
border-color:#b30000;
}

.signup-btn{
width:100%;
padding:13px;
margin-top:15px;
background:#b30000;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.signup-btn:hover{
background:#ff1a1a;
}

.login-link{
margin-top:15px;
font-size:14px;
}

.login-link a{
color:#b30000;
text-decoration:none;
font-weight:600;
}

.login-link a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">

<div class="logo-wrap">
<img src="logo.png.jpeg" class="logo-img">
<div class="logo-text">Spicy Plate</div>
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="index.html#categories">Menu</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="login.html">Login</a></li>
</ul>

</nav>


<!-- ===== SIGNUP AREA ===== -->
<section class="signup-section">

<div class="signup-box">

<div class="signup-title">Join Spicy Plate 🌶️</div>
<div class="signup-sub">Create your account & start ordering</div>

<form action="login.html">

<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email Address" required>
<input type="tel" placeholder="Mobile Number" required>
<input type="password" placeholder="Create Password" required>
<input type="password" placeholder="Confirm Password" required>

<button class="signup-btn">Create Account</button>

</form>

<div class="login-link">
Already have account? <a href="login.html">Login Here</a>
</div>

</div>

</section>


<!-- ===== FOOTER ===== -->
<footer>
© 2026 Spicy Plate — Hot • Fresh • Fast Delivery
</footer>

</body>
</html>
